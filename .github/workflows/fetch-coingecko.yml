name: Fetch CoinGecko snapshots
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run fetch script
        run: bash scripts/fetch_and_prune.sh

      - name: Commit and push
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json coins_list.txt
          git diff --cached --quiet || git commit -m "Update snapshots $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
