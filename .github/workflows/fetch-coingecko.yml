name: Fetch CoinGecko snapshots

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: fetch-coingecko
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run fetch script
        run: |
          chmod +x scripts/fetch_and_prune.sh
          ./scripts/fetch_and_prune.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
