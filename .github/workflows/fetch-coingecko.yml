name: Fetch CoinGecko snapshots

on:
  push:              # <--- reaccion a cambios en el txt
    branches: [main] # (o master, dependiendo de tu rama)
  # ⚠️ IMPORTANTE: 'schedule' debe estar indentado debajo de 'on'
  schedule:
    - cron: '*/05 * * * *'  # Ejecutar cada 30 minutos (usa '*/5' para pruebas rápidas)
  workflow_dispatch: {}     # Permite ejecución manual desde la web

concurrency:
  group: fetch-coingecko
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # ✅ Esto es crucial para que el script pueda hacer 'git push' sin errores
          persist-credentials: true 

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl git

      - name: Run Fetch Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/fetch_and_prune.sh
          # Usamos bash explícitamente para mejor manejo de logs
          bash scripts/fetch_and_prune.sh
