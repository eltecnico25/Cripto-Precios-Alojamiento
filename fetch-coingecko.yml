name: Fetch CoinGecko snapshots

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos (ajusta a tu preferencia)
  workflow_dispatch: {}

concurrency:
  group: fetch-coingecko
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure scripts executable
        run: chmod +x scripts/fetch_and_prune.sh

      - name: Run fetch and prune
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}    # o usa ${{ secrets.GITHUB_TOKEN }} si prefieres
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: ./scripts/fetch_and_prune.sh
